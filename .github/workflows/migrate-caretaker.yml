name: Migrate caretaker

on:
  pull_request:

permissions:
  contents: write

concurrency:
  group: caretaker-${{ github.repository }}
  cancel-in-progress: true

jobs:
  migrate:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            extra-substituters = https://devenv.cachix.org
            extra-trusted-public-keys = devenv.cachix.org-1:w1cLUi8dv3hnoSPGAuibQv+f9TZLr6cv/Hm9XgU50cw=
      - name: Install Nix-native caretaker stack
        shell: bash
        run: |
          set -euo pipefail

          cat > flake.nix <<'EOF'
          {
            description = "Shared Phenix development shell conventions";

            nixConfig = {
              extra-substituters = [ "https://devenv.cachix.org" ];
              extra-trusted-public-keys = [
                "devenv.cachix.org-1:w1cLUi8dv3hnoSPGAuibQv+f9TZLr6cv/Hm9XgU50cw="
              ];
            };

            inputs = {
              devenv-root = { url = "file+file:///dev/null"; flake = false; };
              flake-parts.url = "github:hercules-ci/flake-parts";
              phenix-pins.url = "github:matthis-k/phenix-pins";
              nixpkgs.follows = "phenix-pins/nixpkgs";
              devenv = {
                url = "github:cachix/devenv";
                inputs.nixpkgs.follows = "nixpkgs";
              };
              nix2container = {
                url = "github:nlewo/nix2container";
                inputs.nixpkgs.follows = "nixpkgs";
              };
              mk-shell-bin.url = "github:rrbutani/nix-mk-shell-bin";
              treefmt-nix = {
                url = "github:numtide/treefmt-nix";
                inputs.nixpkgs.follows = "nixpkgs";
              };
              git-hooks = {
                url = "github:cachix/git-hooks.nix";
                inputs.nixpkgs.follows = "nixpkgs";
              };
            };

            outputs = inputs@{ flake-parts, ... }:
              flake-parts.lib.mkFlake { inherit inputs; } {
                systems = [ "x86_64-linux" "aarch64-linux" ];
                imports = [ inputs.devenv.flakeModule ./modules/standalone.nix ];
                flake.flakeModules.default = import ./modules/flake-module.nix;
              };
          }
          EOF

          cat > modules/standalone.nix <<'EOF'
          { ... }: {
            perSystem = { pkgs, ... }: {
              devenv.shells.default = {
                imports = [ ../devenv.nix ];
                packages = [ pkgs.nix pkgs.git pkgs.nixfmt pkgs.statix pkgs.deadnix ];
              };
            };
          }
          EOF

          cat > devenv.nix <<'EOF'
          { lib, ... }:
          let
            caretakerModules = builtins.filter
              (path: builtins.baseNameOf path == "caretaker.nix")
              (lib.filesystem.listFilesRecursive ./.);
          in {
            imports = caretakerModules;
            treefmt = {
              enable = true;
              config.programs.nixfmt.enable = true;
            };
            git-hooks.hooks = {
              treefmt.enable = true;
              statix.enable = true;
              deadnix.enable = true;
            };
            enterShell = ''
              echo "phenix-shell"
              echo "  check: devenv test"
              echo "  fix:   devenv tasks run fix"
            '';
          }
          EOF

          cat > modules/caretaker.nix <<'EOF'
          { ... }: {
            tasks = {
              "check:format" = { exec = "treefmt --fail-on-change"; before = [ "devenv:enterTest" ]; };
              "check:statix" = { exec = "statix check --ignore .git/**"; before = [ "devenv:enterTest" ]; };
              "check:deadnix" = { exec = "deadnix --fail --no-lambda-arg --no-lambda-pattern-names"; before = [ "devenv:enterTest" ]; };
              "check:flake" = {
                exec = ''nix flake check --override-input devenv-root "file+file://"<(printf %s "$PWD") --print-build-logs --keep-going'';
                before = [ "devenv:enterTest" ];
              };
              "fix:format".exec = "treefmt";
              "fix:statix".exec = "statix fix";
              "fix:deadnix".exec = "deadnix --edit --no-lambda-arg --no-lambda-pattern-names";
            };
          }
          EOF

          cat > .stitch.json <<'EOF'
          {
            "role": "producer",
            "layer": 2,
            "dependencies": []
          }
          EOF

          cat > .github/workflows/ci.yml <<'EOF'
          name: CI
          on:
            pull_request:
            push:
              branches: [main]
          permissions:
            contents: read
          jobs:
            checks:
              runs-on: ubuntu-latest
              timeout-minutes: 60
              steps:
                - uses: actions/checkout@v5
                  with: { fetch-depth: 0 }
                - uses: cachix/install-nix-action@v31
                  with:
                    extra_nix_config: |
                      experimental-features = nix-command flakes
                      accept-flake-config = true
                      extra-substituters = https://devenv.cachix.org
                      extra-trusted-public-keys = devenv.cachix.org-1:w1cLUi8dv3hnoSPGAuibQv+f9TZLr6cv/Hm9XgU50cw=
                - shell: bash
                  run: nix flake check --override-input devenv-root "file+file://"<(printf %s "$PWD") --print-build-logs --keep-going
                - shell: bash
                  run: nix develop --override-input devenv-root "file+file://"<(printf %s "$PWD") --command devenv test
                - name: Reject retired references
                  shell: bash
                  run: |
                    needle="$(printf 'te%s' 'nd')"
                    ! git grep -ni "$needle"
          EOF

          rm -f .github/workflows/migrate-caretaker.yml
          git add -A
          nix flake update
          git add -A
          nix flake check --override-input devenv-root "file+file://"<(printf %s "$PWD") --print-build-logs --keep-going
          nix develop --override-input devenv-root "file+file://"<(printf %s "$PWD") --command devenv test
          needle="$(printf 'te%s' 'nd')"
          ! git grep -ni "$needle"

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "refactor: adopt the Nix-native caretaker stack"
          git push origin main
